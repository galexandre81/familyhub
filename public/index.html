<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cuisine">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/styles.css">
  <title>Cuisine</title>
</head>
<body class="page-home">

  <header class="header">
    <div class="header-left">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date">&nbsp;</div>
    </div>
    <div class="header-right">
      <div class="weather" id="weather">
        <div class="weather-icon" id="weather-icon" aria-hidden="true"></div>
        <div class="weather-info">
          <div class="weather-temp" id="weather-temp">--°</div>
          <div class="weather-meta">
            <div class="weather-minmax" id="weather-minmax">&nbsp;</div>
            <div class="weather-summary" id="weather-summary">Chargement…</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="main-header">
      <h1 class="main-title">Cette semaine</h1>
      <div class="main-header-right">
        <div class="main-week" id="week-label">&nbsp;</div>
        <a class="livre-tile" href="/livre.html">
          <span class="livre-tile-icon">&#128214;</span>
          <span class="livre-tile-label">Livre de recettes</span>
        </a>
      </div>
    </div>
    <div class="days" id="days"></div>
  </main>

  <footer class="radio">
    <button class="radio-play" id="radio-play" type="button" aria-label="Lecture">
      <span class="radio-play-icon" id="radio-play-icon">&#9658;</span>
    </button>
    <div class="radio-stations" id="radio-stations"></div>
    <div class="radio-status" id="radio-status">
      <span class="radio-status-dot" id="radio-status-dot"></span>
      <span class="radio-status-text" id="radio-status-text">Arrêté</span>
    </div>
    <audio id="player" preload="none"></audio>
  </footer>

  <script src="/js/weather.js"></script>
  <script src="/js/radio.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
