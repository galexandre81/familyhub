<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cuisine">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/styles.css">
  <title>Recette</title>
</head>
<body class="page-recipe">

  <header class="recipe-header">
    <a class="recipe-back" href="/index.html" aria-label="Retour">
      <span class="recipe-back-arrow">&#8592;</span>
      <span class="recipe-back-label">Retour</span>
    </a>
    <div class="recipe-title-block">
      <h1 class="recipe-title" id="recipe-title">&nbsp;</h1>
      <div class="recipe-meta" id="recipe-meta"></div>
    </div>
    <div class="timer-pill" id="timer-pill" hidden>
      <span class="timer-pill-icon">&#9201;</span>
      <span class="timer-pill-time" id="timer-pill-time">00:00</span>
      <button type="button" class="timer-pill-stop" id="timer-pill-stop" aria-label="Arrêter le minuteur">&times;</button>
    </div>
  </header>

  <section class="ingredients" id="ingredients-section">
    <button class="ingredients-toggle" id="ingredients-toggle" type="button" aria-expanded="true">
      <span class="ingredients-title">Ingrédients</span>
      <span class="ingredients-chevron" id="ingredients-chevron">&#9662;</span>
    </button>
    <ul class="ingredients-list" id="ingredients-list"></ul>
  </section>

  <main class="step-stage">
    <div class="step-counter" id="step-counter">Étape 1 / 1</div>
    <div class="step-text" id="step-text">&nbsp;</div>
    <button type="button" class="step-timer-btn" id="step-timer-btn" hidden>
      <span class="step-timer-icon">&#9201;</span>
      <span class="step-timer-label" id="step-timer-label">Lancer minuteur</span>
    </button>
  </main>

  <nav class="step-nav">
    <button type="button" class="step-nav-btn step-nav-prev" id="step-prev">
      <span class="step-nav-arrow">&#8592;</span>
      <span class="step-nav-label">Précédent</span>
    </button>
    <button type="button" class="step-nav-btn step-nav-next" id="step-next">
      <span class="step-nav-label">Suivant</span>
      <span class="step-nav-arrow">&#8594;</span>
    </button>
  </nav>
