<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Family Hub — Setup</title>
  <link rel="stylesheet" href="/display/css/styles.css">
</head>
<body>
  <div id="setup-root">
    <div class="boot-message">
      <div class="boot-title">Family Hub — Configuration</div>
      <div class="boot-status" id="setup-status">Initialisation…</div>
      <div class="setup-detail" id="setup-detail"></div>
      <button id="setup-reset-btn" class="error-link" style="display:none; margin-top:24px; border:0; cursor:pointer;">Effacer la configuration de cet appareil</button>
    </div>
  </div>

  <!-- Polyfill fetch pour Safari 9 (iPad mini 1) — chargée AVANT Firebase. -->
  <script src="/display/lib/fetch.umd.js"></script>
  <script src="/display/lib/firebase-app.js"></script>
  <script src="/display/lib/firebase-auth.js"></script>
  <script src="/display/lib/firebase-functions.js"></script>
  <script src="/display/js/firebase-config.js"></script>
  <script>
  // Surface any uncaught error directly into the page (no devtools needed on iPad).
  window.addEventListener('error', function (e) {
    var s = document.getElementById('setup-status');
    var d = document.getElementById('setup-detail');
    if (s) s.innerHTML = 'Erreur JS';
    if (d) d.innerHTML = String((e && e.message) || e) + ' @ ' + ((e && e.filename) || '?') + ':' + ((e && e.lineno) || '?');
  });
  </script>
  <script>
  (function () {
    'use strict';

    function getQueryParam(name) {
      var search = window.location.search.replace(/^\?/, '');
      var pairs = search.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var kv = pairs[i].split('=');
        if (decodeURIComponent(kv[0]) === name) {
          return decodeURIComponent(kv[1] || '');
        }
      }
      return '';
    }

    function show(status, detail) {
      var s = document.getElementById('setup-status');
      var d = document.getElementById('setup-detail');
      if (s && status !== undefined) s.innerHTML = status;
      if (d && detail !== undefined) d.innerHTML = detail || '';
    }

    function detectShortId() {
      // Path-based : /d/ABCXYZ
      var path = window.location.pathname || '';
      var m = path.match(/^\/d\/([A-Z0-9]+)\/?$/i);
      if (m) return m[1].toUpperCase();
      // Query-based : ?s=ABCXYZ
      var s = getQueryParam('s');
      if (s) return s.toUpperCase();
      return null;
    }

    /* --- Bouton reset : efface la config locale et force un re-setup --- */
    var resetBtn = document.getElementById('setup-reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', function () {
        try {
          localStorage.removeItem('familyHub.householdId');
          localStorage.removeItem('familyHub.displayId');
          localStorage.removeItem('familyHub.authToken');
          localStorage.removeItem('familyHub.authTokenExpiresAt');
          localStorage.removeItem('familyHub.customToken');
          localStorage.removeItem('familyHub.customTokenIssuedAt');
        } catch (e) { /* noop */ }
        show('Configuration effacée.', 'Génère un nouveau lien depuis le hub puis réouvre /d/CODE.');
        resetBtn.style.display = 'none';
      });
    }

    /* --- Court-circuit : si l'iPad est déjà configuré, on saute l'exchange --- */
    /* Cas typique : bookmark /d/ABCXYZ ré-ouvert après une config réussie,
       OU restauration d'onglet Safari après reboot. */
    try {
      var storedHouseholdId = localStorage.getItem('familyHub.householdId');
      var storedDisplayId = localStorage.getItem('familyHub.displayId');
      var storedCustomToken = localStorage.getItem('familyHub.customToken');
      var storedAuthToken = localStorage.getItem('familyHub.authToken');
      if (storedHouseholdId && storedDisplayId && storedCustomToken && storedAuthToken) {
        if (resetBtn) resetBtn.style.display = 'inline-block';
        show('Cet appareil est déjà configuré.', 'Redirection vers l\'écran…');
        setTimeout(function () { window.location.href = '/display/'; }, 1500);
        return;
      }
    } catch (e) { /* localStorage indispo : on poursuit le flow setup normal */ }

    show('Vérification SDK…', '');
    if (typeof firebase === 'undefined') {
      show('Firebase SDK introuvable', 'Le script firebase-app.js n\'a pas été chargé.');
      return;
    }
    if (!window.__FIREBASE_CONFIG__) {
      show('Config Firebase manquante', 'Le fichier firebase-config.js n\'a pas été chargé.');
      return;
    }

    var functions;
    try {
      firebase.initializeApp(window.__FIREBASE_CONFIG__);
      functions = firebase.app().functions('europe-west1');
    } catch (initErr) {
      show('Erreur d\'init Firebase', String((initErr && initErr.message) || initErr));
      return;
    }
    show('SDK OK, lecture des paramètres…', '');

    function persistAndRedirect(householdId, displayId, data) {
      try {
        localStorage.setItem('familyHub.householdId', householdId);
        localStorage.setItem('familyHub.displayId', displayId);
        localStorage.setItem('familyHub.authToken', data.authToken);
        localStorage.setItem('familyHub.authTokenExpiresAt', String(data.authTokenExpiresAt || 0));
        localStorage.setItem('familyHub.customToken', data.customToken);
        localStorage.setItem('familyHub.customTokenIssuedAt', String(Date.now()));
      } catch (e) {
        show('localStorage indisponible', 'Le mode privé Safari empêche la sauvegarde. Sors du mode privé puis réessaie.');
        return;
      }
      show('Configuration enregistrée', 'Redirection vers l\'écran…');
      setTimeout(function () { window.location.href = '/display/'; }, 800);
    }

    function exchange(householdId, displayId, setupToken) {
      show('Échange du token…', '');
      var fn = functions.httpsCallable('exchangeSetupToken');
      fn({ householdId: householdId, displayId: displayId, setupToken: setupToken })
        .then(function (res) {
          var data = res.data || {};
          if (!data.customToken || !data.authToken) {
            throw new Error('Réponse invalide du serveur');
          }
          persistAndRedirect(householdId, displayId, data);
        })
        .catch(function (err) {
          var msg = (err && err.message) ? err.message : 'Erreur inconnue';
          show('Échec de la configuration', msg);
        });
    }

    function resolveAndExchange(shortId) {
      show('Résolution du code « ' + shortId + ' »…', '');
      var fn = functions.httpsCallable('resolveSetupShortId');
      fn({ shortId: shortId })
        .then(function (res) {
          var data = res.data || {};
          if (!data.householdId || !data.displayId || !data.setupToken) {
            throw new Error('Code invalide');
          }
          exchange(data.householdId, data.displayId, data.setupToken);
        })
        .catch(function (err) {
          var msg = (err && err.message) ? err.message : 'Code introuvable';
          show('Échec', msg + '. Vérifie le code et réessaie.');
        });
    }

    var shortId = detectShortId();
    if (shortId) {
      resolveAndExchange(shortId);
      return;
    }

    var token = getQueryParam('token');
    var householdId = getQueryParam('household');
    var displayId = getQueryParam('display');

    if (token && householdId && displayId) {
      exchange(householdId, displayId, token);
      return;
    }

    show('Lien invalide', 'Les paramètres de setup sont incomplets. Reprends le lien depuis le hub.');
  })();
  </script>
</body>
</html>
